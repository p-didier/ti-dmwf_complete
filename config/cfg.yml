# WASN parameters
K: 10  # number of nodes
Mk: 5  # number of sensors per node
graphDiameter: null  # diameter of the graph corresponding to the network

# Acoustic scenario parameters
Qd: 2  # number of desired sources
Qn: 2  # number of noise sources
D: 1  # number of target signal channels
# observability: poss  # "foss" for fully overlapping subspaces,
observability: foss  # "foss" for fully overlapping subspaces,
    # "poss" for partially overlapping subspaces
# possDiffuse: True  # if True and observability is 'foss', the
possDiffuse: False  # if True and observability is 'foss', the
    # noise sources are assumed only local, i.e., uncorrelated across nodes

# Signals parameters
fs: 16000  # sampling frequency
T: 1.0  # duration of the signals in seconds
# selfNoiseFactor: 0.000001  # self-noise factor, used to scale the noise covariance
selfNoiseFactor: 0.01  # self-noise factor, used to scale the noise covariance
# selfNoiseFactor: 1  # self-noise factor, used to scale the noise covariance

# Algorithm(s) parameters
algos:  # list of algorithms to run
- centralized
- dmwf
- tidmwf
scmEstimation: oracle  # type of SCM estimation to use
    # 'oracle' for perfect knowledge,
    # 'batch' for batch time-averaged,
    # 'online' for online

seed: 42  # random number generator seed