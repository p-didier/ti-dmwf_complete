# ==== File and Directory Parameters ====
baseResultsDir: './out'  # Base directory for results
# resultsDir: './out/res_20250903_1224_full_run_1MC_indivSourceEstimatesOut'  # Results subdirectory
resultsDir: 'latest'  # Results subdirectory

# ==== Export and Recompute Flags ====
export: false  # If True, export the figures to files
forceRecomputeMetrics: true  # If True, recompute metrics even if they exist
forceRecomputeMetrics: false  # If True, recompute metrics even if they exist

# ==== Metrics Computation Parameters ====
metricsChunkDuration: 3  # Duration of the chunk to compute metrics over (in seconds)
metricsChunkShift: 0.25  # Shift of the chunk to compute metrics over (in seconds)
# IMinterval: 0.75  # IM interval specification
IMinterval: 1  # IM interval specification
# ^^^ if list: in seconds, -1 = end of signal
# ^^^ if float: in % of signal, starting from the end 
extendedStoi: false  # If True, use extended STOI computation
metricsToComputeBasis:
- ser
metricsToComputeOverride: null  # If not None, override the metrics to compute
# metricsToComputeOverride:
#   - msew
deltasSnrSer: false  # If True, show SNR and SER as deltas from the local estimate
bypassStoi: false  # If True, bypass STOI computation (useful for debugging)
# IMchunkType: single  # Type of time-chunk to use for intelligibility metric (IM) computation
IMchunkType: multi  # Type of time-chunk to use for intelligibility metric (IM) computation
IMmultiChunkDur: 5.0  # Duration of each chunk for multi-chunk processing (in seconds)
IMmultiChunkShiftDur: 1.0  # Duration of shift of each chunk for multi-chunk processing (in seconds)

# ==== OLD Metrics Computation Parameters ====
cumulatedAverage: false  # If True, apply a cumulative average (smoothing) to the metrics
metricsOverFirstSeconds: 2  # Number of seconds to consider for waveform-based metrics computation
computeMetricsEveryNFrames: 10  # Compute metrics every N frames (for online processing)
metricsMethod: 'entire_signal'  # Method for metrics computation
# metricsToComputeOverride:  # If not None, override the metrics to compute
# - msew
# - msed
multiSpeechSourceManagement: average  # 'separate' or 'average' or 'max' for multi-speech source management

# ==== Node Selection Parameters ====
# whichNodes: 'all'  # 'all' or a list of node indices to process
whichNodes:
- 0

# ==== Plotting Parameters ====
# forcedYlim:  # If not None, force y-axis limits for msew
#   msew:
#     - 1e-27
#     - 1e7
stairsPlot: False  # If True, plot a metrics stairs plot for each static segment (only used in online mode with dynamic scenarios)
stoiRef: null  # Will be set in __post_init__
n_per_col: 2  # Number of figures per column after plt.show()
margin: 100  # Margin between figures in pixels
# intelligibilityMetrics: []
intelligibilityMetrics:
- stoi
# - pesq
# - dnsmos

# ==== Debug Parameters ====
plotWaveforms: true  # If True, plot waveforms for debugging
plotWaveforms: false  # If True, plot waveforms for debugging
